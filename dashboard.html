<body>
  <div class="header-bar">
    <div class="header-left">
      <div>
        <h1>智能客服场景客户流失原因分析工具</h1>
        <div class="subtitle">分析看板 · 数据汇总与可视化</div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="dashboard-header">
      <div class="dashboard-title" id="db-title">分析看板</div>
      <button class="back-btn" onclick="try{window.parent.afCloseDashboard()}catch(e){window.location.href='./'}" style="border-color:#cbd5e1;background:#fff;color:#475569;">← 返回</button>
    </div>
    <div id="db-content">
      <div class="loading-mask" id="db-loading">
        <div class="loading-spinner"></div>
        <div style="font-size:14px;color:#64748b;">正在加载分析数据...</div>
      </div>
    </div>
  </div>

  <script>
    // 从 localStorage 读取当前记录的独立数据（不覆盖旧数据）
    var currentRecordId = localStorage.getItem('af_current_record_id');
    var dashboardDataStr = null;
    var data = null;
    
    // 优先读独立记录数据(新格式 af_rdata_ 优先,兼容旧格式)
    if (currentRecordId) {
      dashboardDataStr = localStorage.getItem('af_rdata_' + currentRecordId);
      if (!dashboardDataStr) {
        dashboardDataStr = localStorage.getItem(currentRecordId);
      }
      if (dashboardDataStr) {
        data = JSON.parse(dashboardDataStr);
        console.log('[Dashboard] 读取独立记录: ' + currentRecordId);
      }
    }
    // 兼容旧数据：如果没有独立记录，读共享的 af_dashboard_data
    if (!data) {
      dashboardDataStr = localStorage.getItem('af_dashboard_data');
      data = dashboardDataStr ? JSON.parse(dashboardDataStr) : null;
    }

    if (!data) {
      document.getElementById('db-content').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><div class="empty-state-text">暂无分析数据</div><div style="font-size:14px;color:#bbb;margin-top:8px;">请从主页面上传Excel并分析后，点击"查看看板"查看</div></div>';
    } else {
      var s = data.summary ? data.summary[0] : {};
      var total = data.rows || s.total || 0;
      var intentAcc = s.intentAcc || 0;
      var completeRate = s.completeRateNum || parseFloat(s.completeRate) || 0;
      var transferRate = parseFloat(s.transferRate) || 0;
      // 全环节转人工求和,覆盖transFerRate用于表格显示
      var fTransferCount = s.fTransferCount || 0;
      var iTransferCount = s.iTransferCount || 0;
      var oTransferCount = s.oTransferCount || 0;
      var qYes = s.qYes || 0;
      var allTransferTotal = fTransferCount + iTransferCount + oTransferCount + qYes;
      transferRate = total > 0 ? parseFloat((allTransferTotal / total * 100).toFixed(1)) : 0;
      var gTotal = s.gTotal || 0;
      var jTotal = s.jTotal || 0;
      var pTotal = s.pTotal || 0;
      var broadcastStay = s.broadcastStay || 0;
      var appealStageLost = s.appealStageLost || 0;
      var relationStageLost = s.relationStageLost || 0;
      var identityStageLost = s.identityStageLost || 0;
      var broadcastStageLost = s.broadcastStageLost || 0;
      var reasonMap = s.reasonMap || {};

      // 核心瓶颈
      var losses = [
        { name: '诉求接入', rate: total > 0 ? (appealStageLost / total * 100) : 0, count: appealStageLost },
        { name: '关系库选择', rate: total > 0 ? (relationStageLost / total * 100) : 0, count: relationStageLost },
        { name: '身份验证', rate: total > 0 ? (identityStageLost / total * 100) : 0, count: identityStageLost },
        { name: '结果播报', rate: total > 0 ? (broadcastStageLost / total * 100) : 0, count: broadcastStageLost }
      ];
      losses.sort(function(a, b) { return b.rate - a.rate; });
      var topLoss = losses[0];

      // 设置标题
      document.getElementById('db-title').textContent = data.file || '分析看板';

      var html = '';

      // KPI卡片
      html += '<div class="kpi-grid">';
      html += '<div class="kpi-card green"><div class="kpi-label">总记录数</div><div class="kpi-value">' + total + '<span class="kpi-unit"> 条</span></div></div>';
      html += '<div class="kpi-card blue"><div class="kpi-label">意图识别准确率</div><div class="kpi-value blue">' + intentAcc + '%</div></div>';
      html += '<div class="kpi-card green"><div class="kpi-label">流程完成率</div><div class="kpi-value">' + completeRate + '%</div></div>';
      html += '<div class="kpi-card red"><div class="kpi-label">转人工率</div><div class="kpi-value red">' + transferRate + '%</div></div>';
      html += '<div class="kpi-card purple"><div class="kpi-label">核心瓶颈</div><div class="kpi-value purple" style="font-size:18px;">' + topLoss.name + '</div><div class="kpi-unit">流失' + topLoss.count + '条，占' + topLoss.rate.toFixed(1) + '%</div></div>';
      html += '</div>';

      // 各环节流失率计算
      var appealLossRate = total > 0 ? ((appealStageLost / total) * 100) : 0;
      var relationLossRate = total > 0 ? ((relationStageLost / total) * 100) : 0;
      var identityLossRate = total > 0 ? ((identityStageLost / total) * 100) : 0;
      var broadcastLossRate = total > 0 ? ((broadcastStageLost / total) * 100) : 0;

      // 根据阈值返回颜色class：绿<5%，橙5-20%，红>20%
      function rateClass(val) {
        if (val < 5) return 'rate-green';
        if (val <= 20) return 'rate-orange';
        return 'rate-red';
      }

      html += '<div class="card">';
      html += '<div class="card-title"><span class="dot">📊</span>各环节客户流失率分析表（汇总统计）';
      html += '<span class="help-icon">?<span class="help-tooltip"><ul style="margin:0;padding-left:16px;">';
      html += '<li>转人工率：Q列中，填"是"的数量 / 样本总数</li>';
      html += '<li>诉求接入流失率：F列中，（挂机数+转人工数）/ 样本总数</li>';
      html += '<li>关系库选择流失率：G列中（挂机数+转人工数）/ 样本总数</li>';
      html += '<li>身份验证流失率：（I列中的挂机数+转人工数 + O列中的挂机数+转人工数）/ 样本总数</li>';
      html += '<li>结果播报流失率：P列"是"且Q列"是"的数量 / 样本总数</li>';
      html += '<li>流程完成率：P列"是"的数量 / 样本总数</li>';
      html += '</ul></span></span>';
      html += '</div>';
      html += '<table class="data-table"><thead><tr><th rowspan="2">场景</th><th rowspan="2">转人工率</th><th colspan="4" style="border-bottom:1px solid #e2e8f0;">各环节流失率</th><th rowspan="2">流程<br>完成率</th></tr>';
      html += '<tr><th>诉求接入</th><th>关系库选择</th><th>身份验证</th><th>结果播报</th></tr></thead><tbody>';
      html += '<tr><td class="scene-cell">' + (data.scene || '停电信息查询') + '</td>';
      html += '<td class="rate-green">' + transferRate + '%</td>';
      html += '<td class="' + rateClass(appealLossRate) + '">' + appealLossRate.toFixed(2) + '%</td>';
      html += '<td class="' + rateClass(relationLossRate) + '">' + relationLossRate.toFixed(2) + '%</td>';
      html += '<td class="' + rateClass(identityLossRate) + '">' + identityLossRate.toFixed(2) + '%</td>';
      html += '<td class="' + rateClass(broadcastLossRate) + '">' + broadcastLossRate.toFixed(2) + '%</td>';
      html += '<td class="' + rateClass(completeRate) + '">' + completeRate + '%</td>';
      html += '</tr></tbody></table></div>';

      // 图表区
      html += '<div class="chart-grid">';
      html += '<div class="chart-box"><div class="chart-title">🔄 环节流失分布</div><div class="chart-container" id="db-funnel"></div></div>';
      html += '<div class="chart-box"><div class="chart-title">📉 流失原因分布</div><div class="chart-container" id="db-loss-chart"></div></div>';
      html += '<div class="chart-box"><div class="chart-title">🔴 转人工原因分布</div><div id="db-reason-list" style="padding:10px 0;"></div></div>';
      html += '</div>';

      // 明细区 - AI建议全宽，闭环清单放下面
      html += '<div class="detail-box" style="margin-bottom:14px;"><div class="detail-header blue">💡 AI优化建议</div><div class="detail-content" id="db-suggestions"><div style="text-align:center;color:#999;padding:20px;font-size:14px;">正在生成AI建议...</div></div></div>';
      html += '<div class="detail-box"><div class="detail-header purple">🧩 闭环落地清单</div><div class="detail-content" id="db-action-list"></div></div>';

      document.getElementById('db-content').innerHTML = html;

      // 渲染漏斗图
      if (typeof echarts !== 'undefined') {
        var funnelDom = document.getElementById('db-funnel');
        if (funnelDom) {
          var fc = echarts.init(funnelDom);
          var identityAuthEnter = total - appealStageLost;  // 诉求接入 - F列流失
          var broadcastEnter = pTotal;                         // P列=是的会话条数
          fc.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c}条' },
            legend: { bottom: 0, textStyle: { fontSize: 13 } },
            series: [{
              type: 'funnel',
              left: '10%', right: '10%', top: '5%', bottom: '18%',
              minSize: '20%', maxSize: '100%',
              sort: 'descending', gap: 4,
              label: { show: true, position: 'inside', fontSize: 13, fontWeight: 600, formatter: '{b}\n{c}条' },
              labelLine: { show: false },
              itemStyle: { borderColor: '#fff', borderWidth: 2 },
              data: [
                { name: '诉求接入', value: total, itemStyle: { color: '#006B54' } },
                { name: '身份认证', value: identityAuthEnter, itemStyle: { color: '#00796B' } },
                { name: '结果播报', value: broadcastEnter, itemStyle: { color: '#81C784' } },
                { name: '结果播报未转人工', value: broadcastStay, itemStyle: { color: '#A5D6A7' } }
              ]
            }]
          });
        }

        // 流失原因饼图
        var lossDom = document.getElementById('db-loss-chart');
        if (lossDom) {
          var lc = echarts.init(lossDom);
          lc.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c}条 ({d}%)' },
            legend: { bottom: 0, textStyle: { fontSize: 13 } },
            series: [{
              type: 'pie',
              radius: ['40%', '70%'],
              center: ['50%', '45%'],
              avoidLabelOverlap: true,
              itemStyle: { borderRadius: 6, borderColor: '#fff', borderWidth: 2 },
              label: { show: true, fontSize: 13, formatter: '{b}\n{d}%' },
              data: [
                { name: '诉求接入流失', value: appealStageLost || 0, itemStyle: { color: '#ef5350' } },
                { name: '关系库选择流失', value: relationStageLost || 0, itemStyle: { color: '#ff7043' } },
                { name: '身份验证流失', value: identityStageLost || 0, itemStyle: { color: '#ffa726' } },
                { name: '结果播报流失', value: broadcastStageLost || 0, itemStyle: { color: '#ffca28' } }
              ]
            }]
          });
        }
      }

      // 转人工原因分布
      var reasonListEl = document.getElementById('db-reason-list');
      if (reasonListEl) {
        var reasonKeys = Object.keys(reasonMap);
        var totalReasons = 0;
        reasonKeys.forEach(function(k) { totalReasons += reasonMap[k]; });
        var rhtml = '<div style="display:flex;flex-direction:column;gap:12px;">';
        if (reasonKeys.length === 0) {
          rhtml += '<div style="text-align:center;color:#999;padding:20px;font-size:14px;">无转人工记录</div>';
        } else {
          reasonKeys.sort(function(a,b){ return reasonMap[b]-reasonMap[a]; });
          reasonKeys.forEach(function(k) {
            var count = reasonMap[k];
            var pct = totalReasons > 0 ? (count / totalReasons * 100).toFixed(1) : 0;
            var barWidth = totalReasons > 0 ? (count / totalReasons * 100) : 0;
            rhtml += '<div>';
            rhtml += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">';
            rhtml += '<span style="font-size:14px;color:#333;">' + k + '</span>';
            rhtml += '<span style="font-size:14px;color:#666;">' + count + '条(' + pct + '%)</span>';
            rhtml += '</div>';
            rhtml += '<div style="background:#f5f5f5;border-radius:4px;height:8px;overflow:hidden;">';
            rhtml += '<div style="height:100%;width:' + barWidth + '%;background:linear-gradient(90deg,#ff7043,#ff5722);border-radius:4px;"></div>';
            rhtml += '</div></div>';
          });
        }
        rhtml += '</div>';
        reasonListEl.innerHTML = rhtml;
      }

      // 闭环落地清单
      var actionEl = document.getElementById('db-action-list');
      if (actionEl) {
        var ahtml = '<div class="action-list">';
        ahtml += '<div class="action-item"><div class="action-item-header"><span class="action-item-num">1</span><span class="action-item-title">定位瓶颈</span></div>' + topLoss.name + '为当前优先排查环节，流失' + topLoss.count + '条，占比' + topLoss.rate.toFixed(1) + '%。建议优先检查该环节的入口话术、流程衔接和兜底策略。</div>';
        ahtml += '<div class="action-item"><div class="action-item-header"><span class="action-item-num">2</span><span class="action-item-title">建议验证</span></div>抽取该环节高频失败样本，补充失败原因标签，形成话术/规则迭代清单。</div>';
        ahtml += '<div class="action-item"><div class="action-item-header"><span class="action-item-num">3</span><span class="action-item-title">效果回看</span></div>上线优化后按完成率、转人工率、最高环节流失率三项指标对比复盘。</div>';
        ahtml += '</div>';
        actionEl.innerHTML = ahtml;
      }

      // 调用AI优化建议（先读缓存）
      dbGenerateAISuggestions();
    }

    // Markdown渲染为图标卡片
    function renderAISuggestions(text) {
      // 1. 清理markdown符号
      text = text.replace(/^\s*---+\s*$/gm, ''); // 删除分隔线
      text = text.replace(/\*\*(.*?)\*\*/g, '$1'); // 删除粗体
      text = text.replace(/^(#+)\s*/gm, ''); // 删除标题#
      text = text.replace(/^\s*[-*]\s+/gm, ''); // 删除列表符
      
      // 2. 图标映射
      var iconMap = {
        '流程设计': '🔄', '流程优化': '🔄',
        '意图识别': '🎯', '意图理解': '🎯',
        '身份认证': '🔐', '身份验证': '🔐', '身份核验': '🔐',
        '关系库': '📋', '关系库选择': '📋',
        '用户体验': '💡', '体验优化': '💡',
        '技术优化': '⚙️', '系统优化': '⚙️',
        '运营分析': '📊', '运营优化': '📊',
        '行业对标': '🏆', '标杆案例': '🏆',
        '话术优化': '💬', '交互优化': '💬',
        '服务分级': '📐', '风险控制': '🛡️',
        '多轮对话': '🔁', '上下文': '🔁',
        '结果播报': '📢', '播报优化': '📢'
      };
      
      // 3. 按【维度名称】分组
      var groups = []; // [{title, icon, analysis: '', cases: []}]
      var currentGroup = null;
      var lines = text.split('\n');
      
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;
        
        // 检测维度标题：【xxx】
        var titleMatch = line.match(/^【([^】]+)】/);
        if (titleMatch) {
          var rawTitle = titleMatch[1].trim();
          // 忽略案例标题
          if (/^案例[\s\d]+$/i.test(rawTitle)) continue;
          
          var title = rawTitle.replace(/[-\s]*\d+$/g, '').trim();
          var icon = '💡';
          for (var key in iconMap) {
            if (title.indexOf(key) >= 0) { icon = iconMap[key]; break; }
          }
          currentGroup = {title: title, icon: icon, analysis: '', cases: []};
          groups.push(currentGroup);
          
          // 提取标题后面的内容（如果有）
          var afterTitle = line.replace(/^【[^】]+】\s*/, '').trim();
          if (afterTitle) {
            if (afterTitle.indexOf('分析') === 0 || afterTitle.indexOf('分析：') === 0 || afterTitle.indexOf('分析:') === 0) {
              currentGroup.analysis = afterTitle.replace(/^分析[：:]?\s*/, '');
            } else if (/行业案例[\s\d]*[：:]/.test(afterTitle)) {
              var caseText = afterTitle.replace(/^行业案例[\s\d]*[：:]?\s*/, '');
              if (caseText && currentGroup.cases.length < 3) currentGroup.cases.push(caseText);
            } else {
              currentGroup.analysis = afterTitle;
            }
          }
          continue;
        }
        
        // 当前维度下添加内容
        if (currentGroup) {
          // 检测"分析："开头
          if (/^分析[：:]?\s*/.test(line)) {
            var analysisText = line.replace(/^分析[：:]?\s*/, '');
            if (analysisText) currentGroup.analysis += (currentGroup.analysis ? '\n' : '') + analysisText;
          }
          // 检测"行业案例X："开头
          else if (/^行业案例[\s\d]*[：:]/.test(line)) {
            var caseText = line.replace(/^行业案例[\s\d]*[：:]?\s*/, '');
            if (caseText && currentGroup.cases.length < 3) currentGroup.cases.push(caseText);
          }
          // 其他内容归入分析
          else {
            currentGroup.analysis += (currentGroup.analysis ? '\n' : '') + line;
          }
        }
      }
      
      // 5. 渲染卡片
      var html = '<div style="display:flex;flex-direction:column;gap:10px;">';
      groups.forEach(function(group) {
        html += '<div style="display:flex;gap:10px;align-items:flex-start;padding:10px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;overflow-x:hidden;word-wrap:break-word;word-break:break-all;">';
        html += '<div style="width:32px;height:32px;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:1px solid #e2e8f0;">' + group.icon + '</div>';
        html += '<div style="flex:1;">';
        if (group.title) {
          html += '<div style="font-size:15px;font-weight:600;color:#1f2937;margin-bottom:8px;">' + group.title + '</div>';
        }
        // 分析
        if (group.analysis && group.analysis.trim()) {
          html += '<div style="font-size:14px;color:#475569;line-height:1.8;">分析：' + group.analysis.trim().replace(/\n/g, '<br>') + '</div>';
        }
        // 行业案例（最多 3 个）
        if (group.cases.length > 0) {
          for (var i = 0; i < group.cases.length && i < 3; i++) {
            var cNum = i + 1;
            html += '<div style="font-size:14px;color:#475569;line-height:1.8;margin-top:6px;"><b style="color:#1976D2;">行业案例 ' + cNum + '：</b>' + group.cases[i].trim().replace(/\n/g, '<br>') + '</div>';
          }
        }
        html += '</div></div>';
      });
      html += '</div>';
      return html;
    }

    // AI优化建议（优先读独立记录数据）
    function dbGenerateAISuggestions() {
      var sugEl = document.getElementById('db-suggestions');
      if (!sugEl) return;

      // 1. 优先读当前独立记录里的 AI 建议
      try {
        var currentRecordId = localStorage.getItem('af_current_record_id');
        if (currentRecordId) {
          var recordData = JSON.parse(localStorage.getItem('af_rdata_' + currentRecordId) || localStorage.getItem(currentRecordId) || '{}');
          if (recordData.aiSuggestions) {
            var html = renderAISuggestions(recordData.aiSuggestions);
            sugEl.innerHTML = html;
            console.log('[AI Suggestions] 使用独立记录数据');
            return;
          }
        }
      } catch(e) { console.log('[AI Suggestions] 读取独立记录失败', e); }

      // 2. 当前记录没有 AI 建议，检查缓存
      var currentRecordId = localStorage.getItem('af_current_record_id') || '';
      var cacheKey = 'af_ai_suggestions_' + currentRecordId + '_' + (data.file || '') + '_' + (data.rows || 0);
      var cached = localStorage.getItem(cacheKey);
      if (cached) {
        try {
          var cacheData = JSON.parse(cached);
          sugEl.innerHTML = cacheData.html;
          console.log('[AI Suggestions] 使用缓存，跳过API调用');
          return;
        } catch(e) {
          localStorage.removeItem(cacheKey);
        }
      }

      var s = data.summary ? data.summary[0] : {};
      var total = data.rows || s.total || 0;
      var intentAcc = s.intentAcc || 0;
      var completeRate = s.completeRateNum || parseFloat(s.completeRate) || 0;
      var transferRate = parseFloat(s.transferRate) || 0;
      var appealLoss = parseFloat(s.appeal) || 0;
      var identityAuth = parseFloat(s.identityAuth) || 0;
      var broadcastLoss = parseFloat(s.broadcastLoss) || 0;
      var gTotal = s.gTotal || 0;
      var jTotal = s.jTotal || 0;
      var pTotal = s.pTotal || 0;
      var appealStageLost = s.appealStageLost || 0;
      var relationStageLost = s.relationStageLost || 0;
      var identityStageLost = s.identityStageLost || 0;
      var broadcastStageLost = s.broadcastStageLost || 0;

      var prompt = '你是95598电力智能客服运营专家。请根据抽检数据给出分析：\n\n';
      prompt += '【抽检数据】\n';
      prompt += '- 场景：停电信息查询\n';
      prompt += '- 样本量：' + total + '条 | 转人工率：' + transferRate + '%\n';
      prompt += '- 诉求接入流失率' + appealLoss + '% | 关系库选择流失率' + (total > 0 ? (relationStageLost/total*100).toFixed(1) : 0) + '%\n';
      prompt += '- 身份认证流失率' + (total > 0 ? (identityStageLost/total*100).toFixed(1) : 0) + '% | 结果播报流失率' + (total > 0 ? (broadcastStageLost/total*100).toFixed(1) : 0) + '%\n';
      prompt += '- 流程完成率：' + completeRate + '% | 转人工率：' + transferRate + '%\n\n';
      prompt += '【输出规则】\n';
      prompt += '1. 每个维度以【维度名称】开头，如【流程设计优化】\n';
      prompt += '2. 每个维度下先写"分析："简要说明该环节的问题和优化方向（1-2句话），如果数据好的环节可以不写分析\n';
      prompt += '3. 分析后给出 2-3 个行业案例，格式为"行业案例1：xxx"、"行业案例2：xxx"，案例要简洁实用，描述其他行业（银行/运营商/政务/能源等）的智能客服做法及可借鉴之处\n';
      prompt += '4. 不要输出对话示例、话术轮次等详细对话内容，只描述案例做法\n';
      prompt += '5. 行业案例最多 3 个，有几个输出几个\n';
      prompt += '6. 至少覆盖 2 个维度，语言简洁，避免空泛描述\n';
      prompt += '7. 不要输出任何总结性开头或结尾，直接从【维度名称】开始\n';

      var sugEl = document.getElementById('db-suggestions');
      if (!sugEl) return;

      var apiKey = 'sk-ivjlWx1Lu30uLBeGVFRvcCvpcXfV1fA5D9VlkMcX7qaHRgFD';
      var retryCount = 0;
      var maxRetries = 3;

      function callAIAPI() {
        fetch('/api/proxy', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Api-Key': apiKey,
            'anthropic-version': '2023-06-01'
          },
          body: JSON.stringify({
            model: 'deepseek-v4-flash',
            max_tokens: 4096,
            messages: [{ role: 'user', content: prompt }]
          })
        })
        .then(function(resp) {
          if ((resp.status === 429 || resp.status === 504) && retryCount < maxRetries) {
            retryCount++;
            sugEl.innerHTML = '<div style="text-align:center;color:#999;padding:20px;font-size:14px;">请求繁忙，第' + retryCount + '次重试中...</div>';
            setTimeout(callAIAPI, 2000);
            return;
          }
          if (!resp.ok) {
            throw new Error('API返回错误 (HTTP ' + resp.status + ')');
          }
          return resp.json();
        })
      .then(function(result) {
        console.log('[AI Suggestions] API返回:', JSON.stringify(result).substring(0, 500));
        var text = '';
        if (result && result.choices && result.choices.length > 0 && result.choices[0].message) {
          text = result.choices[0].message.content;
        } else if (result && result.content && Array.isArray(result.content)) {
          // Anthropic 格式：content是数组，需要提取text类型的block
          result.content.forEach(function(block) {
            if (block.type === 'text' && block.text) text += block.text;
          });
        } else if (result && result.content && typeof result.content === 'string') {
          text = result.content;
        } else if (typeof result === 'string') {
          text = result;
        } else {
          console.error('[AI Suggestions] 未知格式，完整result:', JSON.stringify(result));
          throw new Error('API响应格式异常');
        }
        // 确保text是字符串类型
        if (typeof text !== 'string') text = String(text || '');
        if (text) {
          var sugEl = document.getElementById('db-suggestions');
          // Markdown 清理 + 图标卡片渲染
          var html = renderAISuggestions(text);
          sugEl.innerHTML = html;
          // 保存到缓存
          try {
            var cacheKey = 'af_ai_suggestions_' + (data.file || '') + '_' + (data.rows || 0);
            localStorage.setItem(cacheKey, JSON.stringify({html: html, time: Date.now()}));
            console.log('[AI Suggestions] 已缓存到localStorage');
          } catch(e) { console.log('[AI Suggestions] 缓存失败', e); }
        }
      })
      .catch(function(err) {
        sugEl.innerHTML = '<div style="text-align:center;color:#999;padding:20px;font-size:14px;">AI建议生成失败：' + err.message + '</div>';
      });
      }

      // 发起API调用
      callAIAPI();
    }

    // 响应式调整
    window.addEventListener('resize', function() {
      if (typeof echarts !== 'undefined') {
        ['db-funnel', 'db-loss-chart'].forEach(function(id) {
          var dom = document.getElementById(id);
          if (dom) {
            var chart = echarts.getInstanceByDom(dom);
            if (chart) chart.resize();
          }
        });
      }
    });
  </script>
